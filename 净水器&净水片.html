<h1>净水器</h1>
<p>
    合成:
    <br><img src="净水器配方.png" alt="净水器的合成配方" width="42%" height="auto">
    <br>净水器使用<a target="_blank" href=铝锭.html>铝锭</a>与其他材料合成
    <br>
    <br>注意：净水器一旦放置，就无法被挖掘回收（暂时认为是bug）
    <br>
    <br>界面及使用:
    <br><img src="净水器UI.png" alt="净水器的UI界面" width="42%" height="auto">
    <br>使用时净水器净水时，你需要将净水片与水瓶放置在对应槽位，稍等片刻，你就可以得到干净的水了。
    <br>净水器会在处理水瓶时逐渐消耗净水片的耐久。一片净水片最多可以过滤 9 次水；每次过滤都会造成轻微损耗，直到其最终破损并无法继续使用。
